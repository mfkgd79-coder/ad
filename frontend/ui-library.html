<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Library · Webify</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/ui-library.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-mark">W</div>
      <span class="nav-logo-text">Webify<span class="nav-logo-star">✦</span></span>
    </a>

    <div class="nav-center">
      <a href="index.html" class="nav-link"><i class="fas fa-house"></i> Home</a>
      <a href="ui-library.html" class="nav-link active"><i class="fas fa-layer-group"></i> UI Library</a>
      <a href="build.html" class="nav-link"><i class="fas fa-wand-magic-sparkles"></i> Assistant</a>
    </div>

    <div class="nav-right">
      <a href="build.html" class="nav-cta"><i class="fas fa-bolt"></i> Start Building</a>
      <button class="nav-hamburger" id="navHamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile drawer -->
  <div class="nav-drawer" id="navDrawer">
    <a href="index.html" class="nav-drawer-link"><i class="fas fa-house"></i> Home</a>
    <a href="ui-library.html" class="nav-drawer-link active"><i class="fas fa-layer-group"></i> UI Library</a>
    <a href="build.html" class="nav-drawer-link"><i class="fas fa-wand-magic-sparkles"></i> Assistant</a>
    <a href="build.html" class="nav-drawer-cta"><i class="fas fa-bolt"></i> Start Building</a>
  </div>

  <!-- Page header + category filters -->
  <div class="lib-header">
    <div class="lib-header-inner">
      <div class="lib-title-row">
        <h1>⚡ UI Library</h1>
        <span class="lib-badge" id="componentCount">0 components</span>
      </div>
      <p class="lib-subtitle">Hand-crafted components — click any card to copy code</p>
    </div>

    <!-- Scrollable pill filters -->
    <div class="cat-filter-bar" id="catFilters"></div>
  </div>

  <!-- Component grid -->
  <div class="lib-body">
    <div class="elements-grid" id="libraryGrid"></div>
    <div class="lib-empty" id="libEmpty" style="display:none">
      <i class="fas fa-box-open"></i>
      <p>No components in this category</p>
    </div>
  </div>

  <footer>Webify · <span id="footerCount">0</span> components available</footer>

  <!-- Expand modal -->
  <div class="modal-overlay" id="elementModal">
    <div class="modal-box">
      <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>

      <div class="modal-left">
        <div class="modal-label"><i class="fas fa-eye"></i> Preview</div>
        <div class="demo-area" id="modalLivePreview"></div>
      </div>

      <div class="modal-right">
        <div class="modal-label"><i class="fas fa-code"></i> Code</div>
        <div class="code-tabs">
          <button class="tab-btn active" data-lang="html">HTML</button>
          <button class="tab-btn" data-lang="css">CSS</button>
        </div>
        <div class="code-box">
          <pre id="htmlCode"></pre>
          <pre id="cssCode" style="display:none"></pre>
          <button class="copy-btn" id="copyBtn"><i class="far fa-copy"></i> Copy</button>
        </div>
        <div class="modal-meta">
          <i class="fas fa-tag"></i>
          <span id="elementCategory"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="js/components.js"></script>
  <script src="js/ui-library.js"></script>
  <script>
    var ham = document.getElementById('navHamburger');
    var drawer = document.getElementById('navDrawer');
    if (ham && drawer) {
      ham.addEventListener('click', function() { drawer.classList.toggle('open'); });
      document.addEventListener('click', function(e) {
        if (!ham.contains(e.target) && !drawer.contains(e.target)) drawer.classList.remove('open');
      });
    }
  </script>
</body>
</html>
